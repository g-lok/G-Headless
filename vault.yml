# ── Ansible Vault: Secrets for bootstrap playbooks ──────────
# Edit with your secret values, then encrypt:
#   ansible-vault encrypt vault.yml
# Or decrypt to edit, then re-encrypt:
#   ansible-vault decrypt vault.yml
#   (edit values)
#   ansible-vault encrypt vault.yml
#
# Both playbooks use these same variables:
#   bootstrap_luks_password: "your-luks-password"
#   bootstrap_user_password: "your-user-password"
#
# Root password is NOT set (locked by default — use sudo).

bootstrap_luks_password: ""
bootstrap_user_password: ""
