---
# ── Emergency cleanup (runs even if playbook fails) ───────

- name: Sync disks
  ansible.builtin.shell:
    cmd: sync
  changed_when: false
  failed_when: false

- name: Unmount all btrfs subvolumes
  ansible.builtin.mount:
    path: "{{ bootstrap_mount }}{{ item.path }}"
    fstab: "/tmp/bootstrap-fstab-{{ bootstrap_mount | basename }}"
    state: absent
  loop: "{{ ((bootstrap_btrfs_subvolumes | default([])) + (bootstrap_container_subvolume_list if bootstrap_container_subvolumes | bool else [])) | reverse | list }}"
  when:
    - bootstrap_filesystem | default('btrfs') == 'btrfs'
    - item.path != '/'
  failed_when: false

- name: Natively clean up remaining bootstrap mounts
  ansible.builtin.mount:
    path: "{{ item }}"
    fstab: "/tmp/bootstrap-fstab-{{ bootstrap_mount | basename }}"
    state: absent
  loop:
    - "{{ bootstrap_mount }}/boot"
    - "{{ bootstrap_mount }}"
  failed_when: false

- name: Recursive lazy unmount as last resort
  ansible.builtin.shell:
    cmd: "umount -l -R {{ bootstrap_mount }} 2>/dev/null; true"
  changed_when: false

- name: Delete temporary isolated fstab
  ansible.builtin.file:
    path: "/tmp/bootstrap-fstab-{{ bootstrap_mount | basename }}"
    state: absent

- name: Force-close LUKS + any stale mappers on target disk
  ansible.builtin.shell:
    cmd: |
      real_target=$(readlink -f "{{ bootstrap_target_disk | default('/dev/null') }}")
      for map in $(dmsetup ls 2>/dev/null | cut -f1); do
        device=$(cryptsetup status "$map" 2>/dev/null | sed -n 's/.*device: *//p')
        if [ -n "$device" ] && [ "$(readlink -f "$device")" = "$real_target" ]; then
          cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
        fi
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Close any stale mappers with base name pattern
  ansible.builtin.shell:
    cmd: |
      for map in $(dmsetup ls 2>/dev/null | grep -E "^{{ luks_mapper_base | default('root') }}(-[0-9]+)?$" | cut -f1); do
        cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Remove mount directory
  ansible.builtin.file:
    path: "{{ bootstrap_mount }}"
    state: absent
  failed_when: false
