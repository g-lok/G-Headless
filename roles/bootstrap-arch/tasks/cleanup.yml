---
# ── Cleanup & summary ───────────────────────────────────────

- name: Sync disks before unmount
  ansible.builtin.shell:
    cmd: sync
  changed_when: false

- name: Unmount all btrfs subvolumes
  ansible.builtin.mount:
    path: "{{ bootstrap_mount }}{{ item.path }}"
    fstab: "/tmp/bootstrap-fstab-{{ bootstrap_mount | basename }}"
    state: absent
  loop: "{{ ((bootstrap_btrfs_subvolumes | default([])) + (bootstrap_container_subvolume_list if bootstrap_container_subvolumes | bool else [])) | reverse | list }}"
  when:
    - bootstrap_filesystem == 'btrfs'
    - item.path != '/'
  failed_when: false

- name: Natively clean up remaining bootstrap mounts
  ansible.builtin.mount:
    path: "{{ item }}"
    fstab: "/tmp/bootstrap-fstab-{{ bootstrap_mount | basename }}"
    state: absent
  loop:
    - "{{ bootstrap_mount }}/boot"
    - "{{ bootstrap_mount }}"
  failed_when: false

- name: Recursive lazy unmount as last resort
  ansible.builtin.shell:
    cmd: "umount -l -R {{ bootstrap_mount }} 2>/dev/null; true"
  changed_when: false

- name: Delete temporary isolated fstab
  ansible.builtin.file:
    path: "/tmp/bootstrap-fstab-{{ bootstrap_mount | basename }}"
    state: absent

- name: Force-close LUKS + any stale mappers on target disk
  ansible.builtin.shell:
    cmd: |
      real_target=$(readlink -f "{{ bootstrap_target_disk }}")
      for map in $(dmsetup ls 2>/dev/null | cut -f1); do
        device=$(cryptsetup status "$map" 2>/dev/null | sed -n 's/.*device: *//p')
        if [ -n "$device" ] && [ "$(readlink -f "$device")" = "$real_target" ]; then
          cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
        fi
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Close any stale mappers with base name pattern
  ansible.builtin.shell:
    cmd: |
      for map in $(dmsetup ls 2>/dev/null | grep -E "^{{ luks_mapper_base | default('root') }}(-[0-9]+)?$" | cut -f1); do
        cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Remove mount directory
  ansible.builtin.file:
    path: "{{ bootstrap_mount }}"
    state: absent

- name: Print summary header
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "Bootstrap COMPLETE"
      - "Target: {{ bootstrap_target_disk | default('(image)') }}"
      - "Hostname: {{ bootstrap_hostname }}"
      - "LUKS UUID: {{ luks_uuid | default('(see blkid)') }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

- name: Print x86_64 next steps
  ansible.builtin.debug:
    msg:
      - "Next steps:"
      - "  1. Disconnect NVMe from workstation"
      - "  2. Install drive in target system"
      - "  3. Connect power + Ethernet"
      - "  4. SSH to initramfs (tinyssh):"
      - "     ssh root@{{ bootstrap_net_address.split('/')[0] }}"
      - "  5. Provide LUKS passphrase to unlock"
      - "  6. System boots -> run gloco-ansible arch role"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  when: playbook_type == 'arch'


