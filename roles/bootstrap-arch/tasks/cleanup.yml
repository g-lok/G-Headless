---
# ── Cleanup & summary ───────────────────────────────────────

- name: Sync disks before unmount
  ansible.builtin.shell:
    cmd: sync
  changed_when: false

- name: Lazy-unmount everything under {{ bootstrap_mount }}
  ansible.builtin.shell:
    cmd: "umount -l -R {{ bootstrap_mount }} 2>/dev/null; true"
  changed_when: false
  failed_when: false

- name: Force-close LUKS + any stale mappers on target disk
  ansible.builtin.shell:
    cmd: |
      for map in $(dmsetup ls 2>/dev/null | cut -f1); do
        device=$(cryptsetup status "$map" 2>/dev/null | sed -n 's/.*device: *//p')
        if echo "$device" | grep -q '{{ bootstrap_target_disk }}' 2>/dev/null; then
          cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
        fi
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Remove temp LUKS keyfile
  ansible.builtin.file:
    path: /tmp/luks-keyfile
    state: absent
  no_log: true

- name: Remove mount directory
  ansible.builtin.file:
    path: "{{ bootstrap_mount }}"
    state: absent

- name: Print summary header
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "Bootstrap COMPLETE"
      - "Target: {{ bootstrap_target_disk | default('(image)') }}"
      - "Hostname: {{ bootstrap_hostname }}"
      - "LUKS UUID: {{ luks_uuid | default('(see blkid)') }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

- name: Print x86_64 next steps
  ansible.builtin.debug:
    msg:
      - "Next steps:"
      - "  1. Disconnect NVMe from workstation"
      - "  2. Install drive in target system"
      - "  3. Connect power + Ethernet"
      - "  4. SSH to initramfs (tinyssh):"
      - "     ssh root@{{ bootstrap_net_address.split('/')[0] }}"
      - "  5. Provide LUKS passphrase to unlock"
      - "  6. System boots -> run gloco-ansible arch role"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
  when: playbook_type == 'arch'


