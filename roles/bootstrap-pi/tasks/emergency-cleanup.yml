---
# ── Emergency cleanup for Pi (runs even if playbook fails) ───────

- name: Sync disks
  ansible.builtin.shell:
    cmd: sync
  changed_when: false
  failed_when: false

- name: Natively clean up bootstrap mounts
  ansible.builtin.mount:
    path: "{{ item }}"
    fstab: "/tmp/bootstrap-fstab-{{ bootstrap_mount }}"
    state: absent
  loop:
    - "/mnt/{{ bootstrap_mount }}/boot"
    - "/mnt/{{ bootstrap_mount }}/original"
    - "/mnt/{{ bootstrap_mount }}"
  failed_when: false

- name: Recursive lazy unmount as last resort
  ansible.builtin.shell:
    cmd: "umount -l -R /mnt/{{ bootstrap_mount }} 2>/dev/null; true"
  changed_when: false

- name: Delete temporary isolated fstab
  ansible.builtin.file:
    path: "/tmp/bootstrap-fstab-{{ bootstrap_mount }}"
    state: absent

- name: Force-close LUKS + any stale mappers on target image
  ansible.builtin.shell:
    cmd: |
      real_target=$(readlink -f "{{ tgt_loop | default('/dev/null') }}")
      for map in $(dmsetup ls 2>/dev/null | cut -f1); do
        device=$(cryptsetup status "$map" 2>/dev/null | sed -n 's/.*device: *//p')
        # Check if device matches target loop partition
        if [ -n "$device" ] && echo "$(readlink -f "$device")" | grep -q "^$real_target"; then
          cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
        fi
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Close any stale mappers with base name pattern
  ansible.builtin.shell:
    cmd: |
      for map in $(dmsetup ls 2>/dev/null | grep -E "^{{ luks_mapper_base | default('crypted') }}(-[0-9]+)?$" | cut -f1); do
        cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Detach target image loop device
  ansible.builtin.shell:
    cmd: "losetup -d {{ tgt_loop | default('') }} 2>/dev/null; true"
  changed_when: true
  failed_when: false

- name: Detach source image loop device
  ansible.builtin.shell:
    cmd: "losetup -d {{ src_loop | default('') }} 2>/dev/null; true"
  changed_when: true
  failed_when: false

- name: Remove mount directory
  ansible.builtin.file:
    path: /mnt/{{ bootstrap_mount }}
    state: absent
  failed_when: false
