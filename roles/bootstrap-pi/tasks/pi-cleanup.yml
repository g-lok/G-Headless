---
# ── Pi Phase 3: Copy initramfs, unmount, cleanup ───────────

- name: Copy initramfs to FAT root (critical step)
  ansible.builtin.shell: |
    cp /mnt/{{ bootstrap_mount }}/boot/firmware/{{ pi_initramfs_name }} /mnt/{{ bootstrap_mount }}/boot/{{ pi_initramfs_name }} 2>/dev/null
    ls -lh /mnt/{{ bootstrap_mount }}/boot/{{ pi_initramfs_name }} 2>/dev/null
    ls -lh /mnt/{{ bootstrap_mount }}/boot/firmware/{{ pi_initramfs_name }} 2>/dev/null
  register: initramfs_copy
  changed_when: initramfs_copy.rc == 0
  failed_when: initramfs_copy.stdout is not search(pi_initramfs_name)

- name: Sync before unmount
  ansible.builtin.shell:
    cmd: sync
  changed_when: false

- name: Lazy-unmount everything under {{ bootstrap_mount }}
  ansible.builtin.shell:
    cmd: "umount -l -R /mnt/{{ bootstrap_mount }} 2>/dev/null; true"
  changed_when: false
  failed_when: false

- name: Force-close LUKS + any stale mappers on target image
  ansible.builtin.shell:
    cmd: |
      for map in $(dmsetup ls 2>/dev/null | cut -f1); do
        device=$(cryptsetup status "$map" 2>/dev/null | sed -n 's/.*device: *//p')
        if echo "$device" | grep -q '{{ tgt_loop | default("__NO_LOOP__") }}' 2>/dev/null; then
          cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
        fi
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Close any stale mappers with base name
  ansible.builtin.shell:
    cmd: |
      for map in $(dmsetup ls 2>/dev/null | grep "^{{ bootstrap_luks_mapper_name | default('crypted') }}" | cut -f1); do
        cryptsetup close "$map" 2>&1 || dmsetup remove -f "$map" 2>&1 || true
      done
      udevadm settle
  changed_when: false
  failed_when: false

- name: Detach target image loop device
  ansible.builtin.shell:
    cmd: "losetup -d {{ tgt_loop }}"
  changed_when: true
  failed_when: false

- name: Detach source image loop device
  ansible.builtin.shell:
    cmd: "losetup -d {{ src_loop }}"
  changed_when: true
  failed_when: false

- name: Remove mount directory
  ansible.builtin.file:
    path: /mnt/{{ bootstrap_mount }}
    state: absent

- name: Print summary
  ansible.builtin.debug:
    msg:
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "Pi LUKS bootstrap COMPLETE"
      - "Target: Raspberry Pi {{ bootstrap_pi_model }}"
      - "Output: {{ pi_output_image }}"
      - "Hostname: {{ pi_hostname }}"
      - "LUKS UUID: {{ luks_uuid }}"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
      - "Next steps:"
      - "  1. Write image to SD/SSD:"
      - "     dd if={{ pi_output_image }} of=/dev/sdX bs=4M status=progress"
      - "  2. Insert SD/SSD in Raspberry Pi {{ bootstrap_pi_model }}"
      - "  3. Connect power + Ethernet"
      - "  4. SSH to initramfs (dropbear):"
      - "     ssh root@{{ pi_net_address.split('/')[0] }}"
      - "  5. Run 'cryptroot-unlock' to unlock"
      - "  6. System boots -> run gloco-ansible pi role"
      - "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
